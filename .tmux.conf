# Reload conf
bind r source-file ~/.tmux.conf

set -g default-terminal "tmux-256color"
set -ga terminal-features ",*:RGB"
set -sg escape-time 0

# Split
bind v split-window -h
bind h split-window -v

# Pane move (Option+hjkl, wrap around at edge)
bind-key -nr M-h if-shell -F "#{pane_at_left}" "select-pane -t :.-" "select-pane -L"
bind-key -nr M-j if-shell -F "#{pane_at_bottom}" "select-pane -t :.+" "select-pane -D"
bind-key -nr M-k if-shell -F "#{pane_at_top}" "select-pane -t :.-" "select-pane -U"
bind-key -nr M-l if-shell -F "#{pane_at_right}" "select-pane -t :.+" "select-pane -R"


# Status bar (zellij-like navigation hints)
set -g status on
set -g status-justify centre
set -g status-bg "#1A1028"
set -g status-fg "#C8FF2E"

set -g status-left-length 60
set -g status-right-length 80

# Session / window / pane info
set -g status-left "#[bold]S:#S #[default] | P:#P"
# Navigation hints
set -g status-right "Prefix: C-b | Move: Opt+hjkl(wrap) | Split: v or h | Swap: { or } | Quit: d"

# Window list style
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bold]#[fg=#000000]#[bg=#39FF14] #I:#W #[default]"


# Pane border highlight (neon colors)
set -g pane-border-style fg="#FF10F0"
set -g pane-active-border-style fg="#FF10F0"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[bold]#[fg=#240046]#[bg=#C8FF2E] ACTIVE #[default],#[fg=colour244]#{pane_title}#[default]}"

# Auto-split layout for claude-* sessions
set-hook -g after-new-session \
  'if-shell "tmux display -p \"#{session_name}\" | grep -q \"^claude-\"" \
    "split-window -h -p 35 ; \
     send-keys -t 0 \"yazi\" C-m ; \
     split-window -v -p 30 ; \
     send-keys -t 1 \"claude\" C-m ; \
     select-pane -t 1"'

# Share clipboard with OS using OSC52
set-option -s set-clipboard on
